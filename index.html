<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ancrage</title>
  <style>
    /* === reset === */
        * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        }

        /* === base === */
        body {
        font-family: -apple-system, BlinkMacSystemFont, 
            'Segoe UI', sans-serif;
        font-size: 16px;
        line-height: 1.6;
        color: #1a1a1a;
        background: #f5f5f3;
        min-height: 100vh;
        }

        /* === layout === */
        .app-shell {
        max-width: 480px;
        margin: 0 auto;
        min-height: 100vh;
        background: #ffffff;
        display: flex;
        flex-direction: column;
        }

        /* === typography === */
        h1 { font-size: 22px; font-weight: 500; }
        h2 { font-size: 18px; font-weight: 500; }
        h3 { font-size: 15px; font-weight: 500; }
        p  { font-size: 14px; color: #666; }

        /* === colors === */
        :root {
        --teal:        #1D9E75;
        --teal-light:  #E1F5EE;
        --teal-dark:   #0F6E56;
        --purple:      #7F77DD;
        --purple-light:#EEEDFE;
        --purple-dark: #534AB7;
        --amber:       #BA7517;
        --amber-light: #FAEEDA;
        --gray:        #888780;
        --gray-light:  #F1EFE8;
        --border:      rgba(0,0,0,0.1);
        --text-main:   #1a1a1a;
        --text-muted:  #666666;
        --text-faint:  #999999;
        --bg-main:     #ffffff;
        --bg-surface:  #f5f5f3;
        }

        /* === buttons === */
        .btn {
        display: block;
        width: 100%;
        padding: 12px;
        border: 1px solid var(--border);
        border-radius: 10px;
        background: transparent;
        font-size: 14px;
        font-weight: 500;
        color: var(--text-main);
        cursor: pointer;
        text-align: center;
        }

        .btn-primary {
        background: var(--teal);
        border-color: var(--teal);
        color: white;
        }

        .btn-primary:active {
        background: var(--teal-dark);
        }

        /* === cards === */
        .card {
        background: var(--bg-main);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 1rem 1.25rem;
        }

        /* === badges === */
        .badge {
        display: inline-block;
        font-size: 11px;
        font-weight: 500;
        padding: 2px 8px;
        border-radius: 6px;
        }

        .badge-french { 
        background: var(--purple-light); 
        color: var(--purple-dark); 
        }
        .badge-dev    { 
        background: var(--amber-light);  
        color: var(--amber); 
        }
        .badge-reset  { 
        background: var(--teal-light);   
        color: var(--teal-dark); 
        }
        .badge-free   { 
        background: var(--gray-light);   
        color: var(--gray); 
        }

        /* === utility === */
        .hidden { display: none !important; }
        .text-muted { color: var(--text-muted); }
        .text-faint { color: var(--text-faint); }
        .mt-1 { margin-top: 8px; }
        .mt-2 { margin-top: 16px; }
        .mt-3 { margin-top: 24px; }
  </style>
</head>
<body>

  <!-- SCREENS -->
  <div id="screen-onboarding"></div>
  <div id="screen-app"></div>

  <script>
    // logic goes here
  </script>

</body>
</html>
